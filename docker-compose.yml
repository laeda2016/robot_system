version: '3'
services:
  ros-master:
    image: ros:noetic-ros-core
    command: roscore
    networks:
      - rosnet

  robot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: robot_container
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://ros-master:11311
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    devices:
      - /dev/dri:/dev/dri
    command: /bin/bash -c "source /root/catkin_ws/devel/setup.bash && tail -f /dev/null"
    depends_on:
      - ros-master
    networks:
      - rosnet

networks:
  rosnet:
    driver: bridge
